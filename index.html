<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1815;
  --surface2: #242220;
  --ink: #f0ece4;
  --muted: #6b6560;
  --accent: #e8a327;
  --accent2: #4a9e6b;
  --red: #d44f3a;
  --border: #2e2b27;
  --border2: #3a3630;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 72px;
}

/* HEADER */
header {
  padding: 20px 20px 0;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.logo { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; }
.logo span { font-style: italic; font-weight: 300; color: var(--muted); font-size: 0.85rem; display: block; margin-top: 2px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border2);
  display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 8px; font-size: 0.55rem; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  border: none; background: none; font-family: 'Instrument Sans', sans-serif;
  transition: color 0.2s; gap: 4px;
}
.nav-btn .icon { font-size: 1.2rem; }
.nav-btn.active { color: var(--accent); }

/* VIEWS */
.view { display: none; padding: 20px; }
.view.active { display: block; }

/* SECTION TITLE */
.sec-title {
  font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

/* FORM ELEMENTS */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field input, .field select {
  width: 100%; font-family: 'Instrument Sans', sans-serif; font-size: 0.92rem;
  padding: 11px 14px; border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--ink); border-radius: 8px; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.btn { font-family: 'Instrument Sans', sans-serif; font-size: 0.8rem; font-weight: 600; padding: 12px 18px; border-radius: 8px; border: none; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #000; width: 100%; }
.btn-accent:active { background: #c98e1e; }
.btn-ghost { background: none; color: var(--muted); border: 1.5px solid var(--border2); }
.btn-ghost:active { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: none; color: var(--red); border: 1.5px solid var(--red); }
.btn-sm { font-size: 0.72rem; padding: 7px 12px; }

/* DISH LIST */
.dish-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: border-color 0.2s;
}
.dish-item:active { border-color: var(--accent); }
.dish-emoji { font-size: 1.5rem; flex-shrink: 0; }
.dish-info { flex: 1; min-width: 0; }
.dish-name { font-size: 0.92rem; font-weight: 500; margin-bottom: 3px; }
.dish-macros { font-size: 0.68rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.macro-tag { background: var(--surface); padding: 2px 6px; border-radius: 4px; }
.macro-tag.prot { color: #6db4e8; }
.macro-tag.carb { color: var(--accent); }
.macro-tag.fat  { color: #e87b6d; }
.macro-tag.kcal { color: var(--muted); }
.dish-chevron { color: var(--muted); font-size: 0.8rem; flex-shrink: 0; }

/* INGREDIENT ROW */
.ing-block {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; margin-bottom: 8px;
}
.ing-top { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
.ing-top .field { flex: 1; margin-bottom: 0; }
.ing-search-btn {
  font-family: 'Instrument Sans', sans-serif; font-size: 0.72rem; font-weight: 600;
  padding: 11px 12px; background: var(--accent); color: #000; border: none;
  border-radius: 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.ing-search-btn:disabled { background: var(--border2); color: var(--muted); cursor: default; }
.ing-bottom { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
.ing-bottom .field { margin-bottom: 0; }
.ing-del { background: none; border: 1.5px solid var(--border); color: var(--muted); font-size: 0.8rem; cursor: pointer; padding: 10px 10px; border-radius: 8px; align-self: end; }
.ing-del:active { color: var(--red); border-color: var(--red); }
.ing-macros-found { font-size: 0.68rem; color: var(--accent2); margin-top: 6px; padding: 6px 8px; background: rgba(74,158,107,0.1); border-radius: 6px; }
.ing-macros-notfound { font-size: 0.68rem; color: var(--muted); margin-top: 6px; }

/* OFF RESULTS */
.off-results { display: flex; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; }
.off-item {
  padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: border-color 0.15s;
}
.off-item:active { border-color: var(--accent); }
.off-item-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 4px; }
.off-item-brand { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
.off-item-macros { display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.68rem; }
.off-loading { text-align: center; padding: 32px; color: var(--muted); font-size: 0.82rem; }
.off-empty { text-align: center; padding: 32px; color: var(--muted); font-size: 0.82rem; line-height: 2; }

/* WEEK VIEW */
.day-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; margin-bottom: 4px; }
.day-scroll::-webkit-scrollbar { display: none; }
.day-chip {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--muted); transition: all 0.15s;
}
.day-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.day-chip .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); margin-left: 5px; vertical-align: middle; }

.meal-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.meal-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.meal-label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
.meal-card.lunch .meal-label { color: var(--accent); }
.meal-card.dinner .meal-label { color: var(--accent2); }
.meal-add-btn {
  font-size: 0.68rem; padding: 5px 12px; border: 1px solid var(--border2);
  background: none; border-radius: 6px; cursor: pointer;
  font-family: 'Instrument Sans', sans-serif; color: var(--muted);
}
.meal-add-btn:active { border-color: var(--accent); color: var(--accent); }
.meal-dishes { padding: 10px 16px; min-height: 56px; display: flex; flex-direction: column; gap: 6px; }
.meal-empty { font-size: 0.75rem; color: var(--border2); padding: 6px 0; }
.meal-dish {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 7px; font-size: 0.85rem;
}
.meal-card.lunch .meal-dish { background: rgba(232,163,39,0.08); }
.meal-card.dinner .meal-dish { background: rgba(74,158,107,0.08); }
.meal-dish-name { flex: 1; }
.meal-dish-cal { font-size: 0.65rem; color: var(--muted); }
.meal-dish-del { background: none; border: none; color: var(--border2); font-size: 0.8rem; cursor: pointer; padding: 2px 5px; font-family: 'Instrument Sans', sans-serif; }
.meal-dish-del:active { color: var(--red); }

/* WEEK STATS BAR */
.week-bar {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 12px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;
}
.wbar-val { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--accent); display: block; }
.wbar-lbl { font-size: 0.56rem; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 2px; }

.save-week { width: 100%; background: var(--accent2); color: #fff; margin-top: 14px; }

/* SHOPPING LIST */
.shop-section { margin-bottom: 20px; }
.shop-section-title {
  font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.shop-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: var(--surface2); border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; transition: opacity 0.2s;
}
.shop-item.checked { opacity: 0.35; }
.shop-check {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
  transition: all 0.15s;
}
.shop-item.checked .shop-check { background: var(--accent2); border-color: var(--accent2); }
.shop-name { flex: 1; font-size: 0.88rem; }
.shop-qty { font-size: 0.75rem; color: var(--muted); }
.shop-empty { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 40px 0; line-height: 2; }

/* HISTORY */
.hist-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 10px; overflow: hidden;
}
.hist-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.hist-date { font-size: 0.85rem; font-weight: 600; }
.hist-badges { display: flex; gap: 10px; font-size: 0.65rem; color: var(--muted); }
.hist-body { padding: 12px 16px; }
.hist-dishes { font-size: 0.78rem; color: var(--muted); line-height: 1.9; }

/* STATS */
.kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.kpi-val { font-family: 'Fraunces', serif; font-size: 1.8rem; color: var(--accent); display: block; }
.kpi-lbl { font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 4px; display: block; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-lbl { font-size: 0.78rem; width: 140px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 7px; background: var(--border2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.bar-fill.rep { background: var(--accent); }
.bar-fill.kcal { background: #e87b6d; }
.bar-cnt { font-size: 0.7rem; color: var(--muted); width: 30px; text-align: right; }

.macro-avg-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.macro-avg { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; text-align: center; flex: 1; min-width: 70px; }
.macro-avg-val { font-family: 'Fraunces', serif; font-size: 1.2rem; display: block; }
.macro-avg-lbl { font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 3px; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet {
  background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
  padding: 20px 20px 48px; max-height: 80vh; overflow-y: auto;
  animation: up 0.22s ease;
}
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.sheet-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }

.picker-item {
  display: flex; align-items: center; gap: 12px; padding: 14px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
}
.picker-item:active { border-color: var(--accent); }
.picker-item.used { opacity: 0.3; pointer-events: none; }
.picker-macros { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

.empty { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 40px 0; line-height: 2.2; }
</style>
</head>
<body>

<header>
  <div class="logo">Menú <span>planificador semanal</span></div>
</header>

<!-- VIEWS -->

<!-- 🍽 PLATOS -->
<div class="view active" id="view-platos">
  <br>
  <div class="sec-title">Mis platos</div>

  <div class="card" id="dish-form-card">
    <div class="card-header">
      <span class="card-title" id="form-mode-label">Nuevo plato</span>
      <button class="btn btn-ghost btn-sm" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">Cancelar</button>
    </div>
    <div class="field"><label>Nombre del plato</label><input id="f-name" type="text" placeholder="Ej: Pollo al horno con verduras" maxlength="50"/></div>

    <div style="margin-bottom:10px; font-size:0.62rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);">Ingredientes</div>
    <div id="ing-list"></div>
    <button class="btn btn-ghost btn-sm" onclick="addIngRow()" style="margin-bottom:14px; width:100%">+ Ingrediente</button>

    <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap;" id="macro-preview">
      <span style="font-size:0.7rem;color:var(--muted)">Las macros se calculan al añadir ingredientes</span>
    </div>

    <div class="field">
      <label>Preparación</label>
      <textarea id="f-prep" placeholder="Describe cómo preparar el plato…" rows="4" style="width:100%;font-family:'Instrument Sans',sans-serif;font-size:0.88rem;padding:11px 14px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--ink);border-radius:8px;outline:none;resize:vertical;line-height:1.6;transition:border-color 0.2s;"></textarea>
    </div>

    <button class="btn btn-accent" id="save-dish-btn" onclick="saveDish()">Guardar plato</button>
  </div>

  <div id="dish-list"></div>
</div>

<!-- 📅 SEMANA -->
<div class="view" id="view-semana">
  <br>
  <div class="week-bar" id="week-bar"></div>
  <div class="day-scroll" id="day-scroll"></div>
  <div id="meals-container"></div>
  <button class="btn save-week" onclick="saveWeek()">💾 Guardar semana en historial</button>
</div>

<!-- 🛒 COMPRA -->
<div class="view" id="view-compra">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div class="sec-title" style="margin-bottom:0;flex:1">Lista de la compra</div>
    <button class="btn btn-ghost btn-sm" onclick="resetChecked()">Desmarcar todo</button>
  </div>
  <div id="shop-content"></div>
</div>

<!-- 📚 HISTORIAL -->
<div class="view" id="view-historial">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div class="sec-title" style="margin-bottom:0;flex:1">Historial</div>
    <button class="btn btn-danger btn-sm" onclick="clearHistory()">Borrar todo</button>
  </div>
  <div id="hist-list"></div>
</div>

<!-- 📊 STATS -->
<div class="view" id="view-stats">
  <br>
  <div id="stats-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('platos')" id="nav-platos"><span class="icon">🍽</span>Platos</button>
  <button class="nav-btn" onclick="switchView('semana')" id="nav-semana"><span class="icon">📅</span>Semana</button>
  <button class="nav-btn" onclick="switchView('compra')" id="nav-compra"><span class="icon">🛒</span>Compra</button>
  <button class="nav-btn" onclick="switchView('historial')" id="nav-historial"><span class="icon">📚</span>Historial</button>
  <button class="nav-btn" onclick="switchView('stats')" id="nav-stats"><span class="icon">📊</span>Stats</button>
</nav>

<!-- OFF SEARCH MODAL -->
<div class="overlay" id="off-overlay" onclick="closeOff(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="off-title">Resultados</span>
      <button class="sheet-close" onclick="closeOff()">✕</button>
    </div>
    <div id="off-results-list"></div>
  </div>
</div>

<!-- PICKER MODAL -->
<div class="overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="picker-title">Elige un plato</span>
      <button class="sheet-close" onclick="closePicker()">✕</button>
    </div>
    <div id="picker-list"></div>
  </div>
</div>

<script>
// ── DATA ──
const UNIT_OPTS = ['g','ml','unidad','taza','cdta','cda'];
function calcMacros(ingredients) {
  let p=0,c=0,f=0,k=0;
  ingredients.forEach(ing => {
    const m = ing.macros100;
    if (!m) return;
    const qty = parseFloat(ing.qty) || 0;
    let grams = qty;
    if (ing.unit === 'unidad') grams = qty * 100;
    else if (ing.unit === 'taza') grams = qty * 240;
    else if (ing.unit === 'cdta') grams = qty * 5;
    else if (ing.unit === 'cda')  grams = qty * 15;
    const factor = grams / 100;
    p += (m.p||0)*factor; c += (m.c||0)*factor;
    f += (m.f||0)*factor; k += (m.k||0)*factor;
  });
  return { p: Math.round(p), c: Math.round(c), f: Math.round(f), k: Math.round(k) };
}

let dishes   = JSON.parse(localStorage.getItem('ms-dishes')  || '[]');
let week     = JSON.parse(localStorage.getItem('ms-week')    || '{}');
let history  = JSON.parse(localStorage.getItem('ms-history') || '[]');
let checked  = JSON.parse(localStorage.getItem('ms-checked') || '[]');
let editId   = null;
let selDay   = 0;
let pickerTarget = null;
let activeView = 'platos';

function save() {
  localStorage.setItem('ms-dishes',  JSON.stringify(dishes));
  localStorage.setItem('ms-week',    JSON.stringify(week));
  localStorage.setItem('ms-history', JSON.stringify(history));
  localStorage.setItem('ms-checked', JSON.stringify(checked));
}

const sk = (d,m) => `${d}-${m}`;
const gd = id => dishes.find(d => d.id === id);

// ── VIEWS ──
function switchView(v) {
  activeView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${v}`).classList.add('active');
  if (v==='semana')   renderSemana();
  if (v==='compra')   renderCompra();
  if (v==='historial') renderHistorial();
  if (v==='stats')    renderStats();
}

// ── PLATOS ──
let ingRows = [];
let offTarget = null; // which ingRow id is being searched

function addIngRow(val) {
  const id = (Date.now() + Math.random()).toString();
  ingRows.push({ id, name: val?.name||'', qty: val?.qty||'', unit: val?.unit||'g', macros100: val?.macros100||null });
  renderIngRows();
}

function renderIngRows() {
  const el = document.getElementById('ing-list');
  el.innerHTML = ingRows.map((r, i) => {
    const m = r.macros100;
    const foundHtml = m
      ? `<div class="ing-macros-found">✓ ${m.k ? '🔥'+m.k+'kcal' : ''} · P:${m.p}g · C:${m.c}g · G:${m.f}g <span style="color:var(--muted);font-size:0.62rem">por 100g</span></div>`
      : `<div class="ing-macros-notfound">Sin datos nutricionales — se ignorará en el cálculo</div>`;
    return `
    <div class="ing-block" id="ing-block-${r.id}">
      <div class="ing-top">
        <div class="field">
          ${i===0 ? '<label>Ingrediente</label>' : ''}
          <input type="text" value="${r.name}" placeholder="Pollo, arroz, leche…"
            oninput="updateIng('${r.id}','name',this.value)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();searchOff('${r.id}')}" />
        </div>
        <button class="ing-search-btn" onclick="searchOff('${r.id}')" ${!r.name.trim()?'disabled':''}>🔍 Buscar</button>
      </div>
      <div class="ing-bottom">
        <div class="field">
          ${i===0 ? '<label>Cantidad</label>' : ''}
          <input type="number" value="${r.qty}" placeholder="200" min="0"
            oninput="updateIng('${r.id}','qty',this.value)" />
        </div>
        <div class="field">
          ${i===0 ? '<label>Unidad</label>' : ''}
          <select onchange="updateIng('${r.id}','unit',this.value)">
            ${UNIT_OPTS.map(u => `<option value="${u}" ${u===r.unit?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <button class="ing-del" onclick="delIng('${r.id}')">✕</button>
      </div>
      ${foundHtml}
    </div>`;
  }).join('');
  updateMacroPreview();
}

function updateIng(id, field, val) {
  const r = ingRows.find(r => r.id == id);
  if (!r) return;
  r[field] = val;
  // If name changed, clear previous macros
  if (field === 'name') r.macros100 = null;
  // Update search button state
  const btn = document.querySelector(`#ing-block-${id} .ing-search-btn`);
  if (btn) btn.disabled = !val.trim();
  updateMacroPreview();
}

function delIng(id) {
  ingRows = ingRows.filter(r => r.id != id);
  renderIngRows();
}

// ── OPEN FOOD FACTS SEARCH ──
async function searchOff(ingId) {
  const r = ingRows.find(r => r.id == ingId);
  if (!r || !r.name.trim()) return;
  offTarget = ingId;

  document.getElementById('off-title').textContent = `"${r.name}"`;
  document.getElementById('off-results-list').innerHTML = '<div class="off-loading">Buscando en Open Food Facts…</div>';
  document.getElementById('off-overlay').classList.add('open');

  try {
    const query = encodeURIComponent(r.name.trim());
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1&page_size=10&lc=es`;
    const res = await fetch(url);
    const data = await res.json();
    renderOffResults(data.products || []);
  } catch(e) {
    document.getElementById('off-results-list').innerHTML =
      '<div class="off-empty">Error de conexión.<br>Comprueba tu internet e inténtalo de nuevo.</div>';
  }
}

function renderOffResults(products) {
  const el = document.getElementById('off-results-list');
  const valid = products.filter(p => {
    const n = p.nutriments;
    return n && (n['energy-kcal_100g'] || n['energy_100g']);
  });

  if (!valid.length) {
    el.innerHTML = '<div class="off-empty">Sin resultados con datos nutricionales.<br>Prueba con otro nombre o en inglés.</div>';
    return;
  }

  el.innerHTML = '<div class="off-results">' + valid.slice(0,8).map(p => {
    const n = p.nutriments;
    const kcal = Math.round(n['energy-kcal_100g'] || n['energy_100g']/4.184 || 0);
    const prot = Math.round(n['proteins_100g'] || 0);
    const carb = Math.round(n['carbohydrates_100g'] || 0);
    const fat  = Math.round(n['fat_100g'] || 0);
    const name = p.product_name || p.product_name_es || 'Sin nombre';
    const brand = p.brands || '';
    return `<div class="off-item" onclick="selectOffProduct(${JSON.stringify({k:kcal,p:prot,c:carb,f:fat}).replace(/"/g,'&quot;')}, '${name.replace(/'/g,"\\'")}')">
      <div class="off-item-name">${name}</div>
      ${brand ? `<div class="off-item-brand">${brand}</div>` : ''}
      <div class="off-item-macros">
        <span class="macro-tag kcal">🔥${kcal}kcal</span>
        <span class="macro-tag prot">P:${prot}g</span>
        <span class="macro-tag carb">C:${carb}g</span>
        <span class="macro-tag fat">G:${fat}g</span>
        <span style="font-size:0.62rem;color:var(--muted)">por 100g</span>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function selectOffProduct(macros100, productName) {
  const r = ingRows.find(r => r.id == offTarget);
  if (!r) return;
  r.macros100 = macros100;
  r.name = r.name || productName; // keep user's name if they typed one
  closeOff();
  renderIngRows();
}

function closeOff(e) {
  if (e && e.target !== document.getElementById('off-overlay')) return;
  document.getElementById('off-overlay').classList.remove('open');
  offTarget = null;
}

function updateMacroPreview() {
  const m = calcMacros(ingRows);
  const el = document.getElementById('macro-preview');
  const hasData = ingRows.some(r => r.macros100);
  el.innerHTML = hasData
    ? `<span class="macro-tag prot">P: ${m.p}g</span>
       <span class="macro-tag carb">C: ${m.c}g</span>
       <span class="macro-tag fat">G: ${m.f}g</span>
       <span class="macro-tag kcal">🔥 ${m.k} kcal</span>
       <span style="font-size:0.62rem;color:var(--muted)">(total del plato)</span>`
    : `<span style="font-size:0.7rem;color:var(--muted)">Busca ingredientes para calcular macros reales</span>`;
}

function saveDish() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const prep = document.getElementById('f-prep').value.trim();
  const ings = ingRows.filter(r => r.name.trim());
  const macros = calcMacros(ings);

  if (editId) {
    const idx = dishes.findIndex(d => d.id === editId);
    if (idx > -1) dishes[idx] = { ...dishes[idx], name, prep, ingredients: ings, macros };
    cancelEdit();
  } else {
    dishes.push({ id: Date.now().toString(), name, emoji: '🍽', prep, ingredients: ings, macros });
    document.getElementById('f-name').value = '';
    document.getElementById('f-prep').value = '';
    ingRows = [];
    renderIngRows();
    document.getElementById('f-name').focus();
  }
  save();
  renderDishList();
}

function editDish(id) {
  const d = gd(id);
  if (!d) return;
  editId = id;
  document.getElementById('f-name').value = d.name;
  document.getElementById('f-prep').value = d.prep || '';
  ingRows = (d.ingredients || []).map(i => ({...i, id: (Date.now()+Math.random()).toString()}));
  renderIngRows();
  document.getElementById('form-mode-label').textContent = 'Editar plato';
  document.getElementById('cancel-edit-btn').style.display = 'inline-flex';
  document.getElementById('save-dish-btn').textContent = 'Actualizar plato';
  document.getElementById('dish-form-card').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  editId = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-prep').value = '';
  ingRows = [];
  renderIngRows();
  document.getElementById('form-mode-label').textContent = 'Nuevo plato';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('save-dish-btn').textContent = 'Guardar plato';
}

function deleteDish(id) {
  if (!confirm('¿Eliminar este plato?')) return;
  dishes = dishes.filter(d => d.id !== id);
  Object.keys(week).forEach(k => { week[k] = week[k].filter(x => x !== id); });
  save(); renderDishList();
  if (activeView === 'semana') renderMeals();
}

function renderDishList() {
  const el = document.getElementById('dish-list');
  if (!dishes.length) {
    el.innerHTML = '<div class="empty">Crea tu primer plato arriba ↑<br>Añade ingredientes para calcular macros automáticamente</div>';
    return;
  }
  el.innerHTML = dishes.map(d => {
    const m = d.macros || {};
    return `<div class="dish-item" onclick="editDish('${d.id}')">
      <span class="dish-emoji">${d.emoji}</span>
      <div class="dish-info">
        <div class="dish-name">${d.name}</div>
        <div class="dish-macros">
          ${m.k ? `<span class="macro-tag kcal">🔥${m.k}kcal</span>` : ''}
          ${m.p ? `<span class="macro-tag prot">P:${m.p}g</span>` : ''}
          ${m.c ? `<span class="macro-tag carb">C:${m.c}g</span>` : ''}
          ${m.f ? `<span class="macro-tag fat">G:${m.f}g</span>` : ''}
          ${d.price ? `<span class="macro-tag" style="color:var(--accent2)">${d.price.toFixed(2)}€</span>` : ''}
          ${!m.k && !d.price ? '<span style="font-size:0.68rem;color:var(--muted)">Sin datos</span>' : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <span class="dish-chevron">✎</span>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteDish('${d.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── SEMANA ──
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function calcWeekTotals() {
  let k=0, pr=0, cost=0, ids=new Set();
  for (let d=0;d<7;d++) ['lunch','dinner'].forEach(m => {
    (week[sk(d,m)]||[]).forEach(id => {
      const dish = gd(id); if (!dish) return;
      ids.add(id);
      k    += dish.macros?.k || 0;
      pr   += dish.macros?.p || 0;
      cost += dish.price || 0;
    });
  });
  return { k, pr, cost, unique: ids.size };
}

function renderSemana() {
  renderDayScroll(); renderMeals(); renderWeekBar();
}

function renderWeekBar() {
  const { k, pr, cost, unique } = calcWeekTotals();
  document.getElementById('week-bar').innerHTML = `
    <div><span class="wbar-val">${unique}</span><span class="wbar-lbl">platos únicos</span></div>
    <div><span class="wbar-val">${k ? Math.round(k/7) : '—'}</span><span class="wbar-lbl">kcal/día</span></div>
    <div><span class="wbar-val">${pr ? Math.round(pr/7)+'g' : '—'}</span><span class="wbar-lbl">prot/día</span></div>
    <div><span class="wbar-val">${cost ? cost.toFixed(0)+'€' : '—'}</span><span class="wbar-lbl">coste</span></div>`;
}

function renderDayScroll() {
  document.getElementById('day-scroll').innerHTML = DAYS.map((day,i) => {
    const hasData = ['lunch','dinner'].some(m => (week[sk(i,m)]||[]).length > 0);
    return `<div class="day-chip ${i===selDay?'active':''}" onclick="selDay=${i};renderSemana()">
      ${day}${hasData?'<span class="dot"></span>':''}
    </div>`;
  }).join('');
}

function renderMeals() {
  document.getElementById('meals-container').innerHTML = ['lunch','dinner'].map(meal => {
    const key = sk(selDay, meal);
    const slotDishes = (week[key]||[]).map(gd).filter(Boolean);
    const icon  = meal==='lunch' ? '☀️' : '🌙';
    const label = meal==='lunch' ? 'Comida' : 'Cena';
    const dishesHtml = slotDishes.length
      ? slotDishes.map(d => `
          <div class="meal-dish">
            <span>${d.emoji}</span>
            <span class="meal-dish-name">${d.name}</span>
            <span class="meal-dish-cal">${d.macros?.k ? d.macros.k+'k' : ''}</span>
            <button class="meal-dish-del" onclick="removeFromSlot(${selDay},'${meal}','${d.id}')">✕</button>
          </div>`).join('')
      : '<div class="meal-empty">Sin plato asignado</div>';
    return `
      <div class="meal-card ${meal}">
        <div class="meal-card-head">
          <span class="meal-label">${icon} ${label}</span>
          <button class="meal-add-btn" onclick="openPicker(${selDay},'${meal}')">+ Añadir</button>
        </div>
        <div class="meal-dishes">${dishesHtml}</div>
      </div>`;
  }).join('');
  renderWeekBar();
}

function removeFromSlot(dayIdx, meal, dishId) {
  const key = sk(dayIdx, meal);
  if (week[key]) week[key] = week[key].filter(id => id !== dishId);
  save(); renderMeals(); renderDayScroll();
}

function saveWeek() {
  const { k, pr, cost, unique } = calcWeekTotals();
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay()+6)%7));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt = d => d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const label = `${fmt(mon)} – ${fmt(sun)}`;

  const snapshot = { label, date: Date.now(), k, pr, cost, unique, slots: {} };
  for (let d=0;d<7;d++) ['lunch','dinner'].forEach(m => {
    snapshot.slots[sk(d,m)] = (week[sk(d,m)]||[]).map(id => {
      const dish = gd(id);
      return dish ? { name:dish.name, emoji:dish.emoji, macros:dish.macros, price:dish.price, ingredients:dish.ingredients } : null;
    }).filter(Boolean);
  });
  history.unshift(snapshot);
  save();
  alert('✅ Semana guardada');
}

// ── COMPRA ──
function buildShoppingList() {
  const totals = {}; // key: name → { qty, unit, dishes }
  for (let d=0;d<7;d++) ['lunch','dinner'].forEach(m => {
    (week[sk(d,m)]||[]).forEach(id => {
      const dish = gd(id); if (!dish) return;
      (dish.ingredients||[]).forEach(ing => {
        if (!ing.name.trim()) return;
        const key = ing.name.toLowerCase().trim() + '_' + ing.unit;
        if (!totals[key]) totals[key] = { name: ing.name, unit: ing.unit, qty: 0, dishes: new Set() };
        totals[key].qty += parseFloat(ing.qty) || 0;
        totals[key].dishes.add(dish.name);
      });
    });
  });
  return Object.values(totals).map(t => ({...t, dishes: [...t.dishes]}));
}

function renderCompra() {
  const el = document.getElementById('shop-content');
  const list = buildShoppingList();
  if (!list.length) {
    el.innerHTML = '<div class="shop-empty">Planifica tu semana primero.<br>Los ingredientes aparecerán aquí automáticamente.</div>';
    return;
  }
  // Group by category (simple: protein, veg, carbs, other)
  const groups = { 'Proteínas': [], 'Verduras': [], 'Carbohidratos': [], 'Otros': [] };
  const prot = ['pollo','carne','ternera','cerdo','salmón','salmon','atun','atún','huevo','huevos','jamon','jamón','chorizo'];
  const veg  = ['tomate','tomates','cebolla','cebollas','zanahoria','zanahorias','lechuga','espinaca','espinacas','brocoli','brócoli'];
  const carb = ['arroz','pasta','patata','patatas','pan','lentejas','garbanzos'];

  list.forEach(item => {
    const k = item.name.toLowerCase().trim();
    if (prot.some(p => k.includes(p))) groups['Proteínas'].push(item);
    else if (veg.some(p => k.includes(p))) groups['Verduras'].push(item);
    else if (carb.some(p => k.includes(p))) groups['Carbohidratos'].push(item);
    else groups['Otros'].push(item);
  });

  el.innerHTML = Object.entries(groups).filter(([,items]) => items.length).map(([gname, items]) => `
    <div class="shop-section">
      <div class="shop-section-title">${gname}</div>
      ${items.map(item => {
        const ckey = item.name.toLowerCase()+'_'+item.unit;
        const isChecked = checked.includes(ckey);
        return `<div class="shop-item ${isChecked?'checked':''}" onclick="toggleCheck('${ckey}')">
          <div class="shop-check">${isChecked?'✓':''}</div>
          <span class="shop-name">${item.name}</span>
          <span class="shop-qty">${item.qty > 0 ? item.qty+' '+item.unit : item.unit}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function toggleCheck(key) {
  const idx = checked.indexOf(key);
  if (idx > -1) checked.splice(idx,1);
  else checked.push(key);
  save(); renderCompra();
}

function resetChecked() { checked = []; save(); renderCompra(); }

// ── HISTORIAL ──
function renderHistorial() {
  const el = document.getElementById('hist-list');
  if (!history.length) {
    el.innerHTML = '<div class="empty">Aún no hay semanas guardadas.<br>Ve a "Semana" y pulsa guardar cuando acabes de planificar.</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    let dishNames = [];
    for (let d=0;d<7;d++) ['lunch','dinner'].forEach(m => {
      (h.slots[sk(d,m)]||[]).forEach(dish => dishNames.push(dish.emoji+' '+dish.name));
    });
    const unique = [...new Set(dishNames)];
    return `<div class="hist-card">
      <div class="hist-head">
        <span class="hist-date">${h.label}</span>
        <div class="hist-badges">
          <span>${h.unique} platos</span>
          ${h.k ? '<span>'+Math.round(h.k/7)+'kcal/d</span>' : ''}
          ${h.cost ? '<span>'+h.cost.toFixed(0)+'€</span>' : ''}
        </div>
      </div>
      <div class="hist-body">
        <div class="hist-dishes">${unique.slice(0,8).join('  ·  ')}${unique.length>8?'  +'+( unique.length-8)+' más':''}</div>
      </div>
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('¿Borrar todo el historial?')) return;
  history = []; save(); renderHistorial();
}

// ── STATS ──
function renderStats() {
  const el = document.getElementById('stats-content');
  if (!history.length) {
    el.innerHTML = '<div class="empty">Guarda al menos una semana<br>para ver estadísticas.</div>';
    return;
  }
  const counts = {}, kcals = [], costs = [], protsAvg = [];
  history.forEach(h => {
    kcals.push(h.k||0); costs.push(h.cost||0); protsAvg.push(h.pr||0);
    for (let d=0;d<7;d++) ['lunch','dinner'].forEach(m => {
      (h.slots[sk(d,m)]||[]).forEach(dish => {
        const key = dish.emoji+' '+dish.name;
        counts[key] = (counts[key]||0)+1;
      });
    });
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxC = sorted[0]?.[1]||1;
  const avgKcal = kcals.reduce((a,b)=>a+b,0)/history.length;
  const avgCost = costs.reduce((a,b)=>a+b,0)/history.length;
  const avgProt = protsAvg.reduce((a,b)=>a+b,0)/history.length;
  const avgUniq = history.reduce((a,h)=>a+h.unique,0)/history.length;

  el.innerHTML = `
    <div class="sec-title">Resumen general</div>
    <div class="kpi-row">
      <div class="kpi"><span class="kpi-val">${history.length}</span><span class="kpi-lbl">semanas</span></div>
      <div class="kpi"><span class="kpi-val">${Math.round(avgUniq)}</span><span class="kpi-lbl">platos únicos/sem</span></div>
      <div class="kpi"><span class="kpi-val">${avgKcal ? Math.round(avgKcal/7) : '—'}</span><span class="kpi-lbl">kcal/día prom</span></div>
      <div class="kpi"><span class="kpi-val">${avgCost ? avgCost.toFixed(0)+'€' : '—'}</span><span class="kpi-lbl">coste/sem prom</span></div>
    </div>

    ${avgProt ? `<div class="sec-title">Macros promedio / día</div>
    <div class="macro-avg-row">
      <div class="macro-avg"><span class="macro-avg-val" style="color:#6db4e8">${Math.round(avgProt/7)}g</span><span class="macro-avg-lbl">Proteína</span></div>
      <div class="macro-avg"><span class="macro-avg-val" style="color:var(--accent)">${avgKcal ? Math.round(avgKcal/7) : '—'}</span><span class="macro-avg-lbl">Kcal</span></div>
    </div>` : ''}

    <div class="sec-title">Platos más repetidos</div>
    ${sorted.map(([name,count]) => `
      <div class="bar-row">
        <span class="bar-lbl">${name}</span>
        <div class="bar-track"><div class="bar-fill rep" style="width:${Math.round(count/maxC*100)}%"></div></div>
        <span class="bar-cnt">${count}x</span>
      </div>`).join('')}`;
}

// ── PICKER ──
function openPicker(dayIdx, meal) {
  pickerTarget = { dayIdx, meal };
  const key = sk(dayIdx, meal);
  const assigned = week[key]||[];
  document.getElementById('picker-title').textContent = `${DAYS[dayIdx]} — ${meal==='lunch'?'Comida':'Cena'}`;
  const list = document.getElementById('picker-list');
  list.innerHTML = !dishes.length
    ? '<div class="empty">Crea platos primero en "Platos"</div>'
    : dishes.map(d => {
        const used = assigned.includes(d.id);
        const m = d.macros||{};
        return `<div class="picker-item ${used?'used':''}" onclick="pickDish('${d.id}')">
          <span style="font-size:1.4rem">${d.emoji}</span>
          <div style="flex:1">
            <div style="font-size:0.9rem;font-weight:500">${d.name}</div>
            <div class="picker-macros">${m.k?'🔥'+m.k+'kcal':''} ${m.p?'· P:'+m.p+'g':''} ${d.price?'· '+d.price.toFixed(2)+'€':''}</div>
          </div>
          ${used?'<span style="color:var(--accent2);font-size:0.8rem">✓</span>':''}
        </div>`;
      }).join('');
  document.getElementById('picker-overlay').classList.add('open');
}

function pickDish(dishId) {
  if (!pickerTarget) return;
  const key = sk(pickerTarget.dayIdx, pickerTarget.meal);
  if (!week[key]) week[key] = [];
  if (!week[key].includes(dishId)) week[key].push(dishId);
  save(); closePicker(); renderMeals(); renderDayScroll();
}

function closePicker(e) {
  if (e && e.target !== document.getElementById('picker-overlay')) return;
  document.getElementById('picker-overlay').classList.remove('open');
  pickerTarget = null;
}

// ── INIT ──
renderDishList();
renderIngRows();
</script>
