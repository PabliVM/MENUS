<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0c; --surface:#1a1815; --surface2:#242220; --ink:#f0ece4;
  --muted:#6b6560; --accent:#e8a327; --accent2:#4a9e6b; --red:#d44f3a;
  --border:#2e2b27; --border2:#3a3630;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:72px}

/* SYNC BADGE */
.sync-badge{position:fixed;top:12px;right:16px;z-index:500;font-size:0.62rem;letter-spacing:1px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);transition:all 0.3s}
.sync-badge.synced{color:var(--accent2);border-color:var(--accent2)}
.sync-badge.syncing{color:var(--accent);border-color:var(--accent)}
.sync-badge.error{color:var(--red);border-color:var(--red)}

header{padding:20px 20px 0;display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1}
.logo span{font-style:italic;font-weight:300;color:var(--muted);font-size:0.85rem;display:block;margin-top:2px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;font-size:0.55rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'Instrument Sans',sans-serif;transition:color 0.2s;gap:4px}
.nav-btn .icon{font-size:1.2rem}
.nav-btn.active{color:var(--accent)}

.view{display:none;padding:20px}
.view.active{display:block}

.sec-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border2)}

.card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

.field{margin-bottom:12px}
.field label{display:block;font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;font-family:'Instrument Sans',sans-serif;font-size:0.92rem;padding:11px 14px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--ink);border-radius:8px;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field input::placeholder,.field textarea::placeholder{color:var(--muted)}
.field textarea{resize:vertical;line-height:1.6}

.btn{font-family:'Instrument Sans',sans-serif;font-size:0.8rem;font-weight:600;padding:12px 18px;border-radius:8px;border:none;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s}
.btn-accent{background:var(--accent);color:#000;width:100%}
.btn-accent:active{background:#c98e1e}
.btn-ghost{background:none;color:var(--muted);border:1.5px solid var(--border2)}
.btn-ghost:active{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:none;color:var(--red);border:1.5px solid var(--red)}
.btn-green{background:var(--accent2);color:#fff;width:100%}
.btn-sm{font-size:0.72rem;padding:7px 12px}

/* DISH LIST */
.dish-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s}
.dish-item:active{border-color:var(--accent)}
.dish-emoji{font-size:1.5rem;flex-shrink:0}
.dish-info{flex:1;min-width:0}
.dish-name{font-size:0.92rem;font-weight:500;margin-bottom:3px}
.dish-macros{font-size:0.68rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.macro-tag{background:var(--surface);padding:2px 6px;border-radius:4px}
.macro-tag.prot{color:#6db4e8}
.macro-tag.carb{color:var(--accent)}
.macro-tag.fat{color:#e87b6d}
.macro-tag.kcal{color:var(--muted)}

/* INGREDIENT BLOCK */
.ing-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.ing-top{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}
.ing-top .field{flex:1;margin-bottom:0}
.ing-ai-btn{font-family:'Instrument Sans',sans-serif;font-size:0.72rem;font-weight:600;padding:11px 12px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ing-ai-btn:disabled{background:var(--border2);color:var(--muted);cursor:default}
.ing-ai-btn.loading{background:var(--border2);color:var(--accent);cursor:wait}
.ing-bottom{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
.ing-bottom .field{margin-bottom:0}
.ing-del{background:none;border:1.5px solid var(--border);color:var(--muted);font-size:0.8rem;cursor:pointer;padding:10px;border-radius:8px;align-self:end}
.ing-del:active{color:var(--red);border-color:var(--red)}
.ing-result{font-size:0.68rem;margin-top:6px;padding:6px 8px;border-radius:6px}
.ing-result.found{color:var(--accent2);background:rgba(74,158,107,0.1)}
.ing-result.notfound{color:var(--muted);background:var(--surface)}
.ing-result.error{color:var(--red);background:rgba(212,79,58,0.08)}

/* MACRO PREVIEW */
.macro-preview{background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* WEEK VIEW */
.week-bar{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:14px 18px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.wbar-val{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--accent);display:block}
.wbar-lbl{font-size:0.56rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px}
.day-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;margin-bottom:4px}
.day-scroll::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface2);color:var(--muted);transition:all 0.15s}
.day-chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.day-chip .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent2);margin-left:5px;vertical-align:middle}

.meal-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden}
.meal-card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.meal-label{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.meal-card.lunch .meal-label{color:var(--accent)}
.meal-card.dinner .meal-label{color:var(--accent2)}
.meal-add-btn{font-size:0.68rem;padding:5px 12px;border:1px solid var(--border2);background:none;border-radius:6px;cursor:pointer;font-family:'Instrument Sans',sans-serif;color:var(--muted)}
.meal-add-btn:active{border-color:var(--accent);color:var(--accent)}
.meal-dishes{padding:10px 16px;min-height:56px;display:flex;flex-direction:column;gap:6px}
.meal-empty{font-size:0.75rem;color:var(--border2);padding:6px 0}
.meal-dish{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:0.85rem}
.meal-card.lunch .meal-dish{background:rgba(232,163,39,0.08)}
.meal-card.dinner .meal-dish{background:rgba(74,158,107,0.08)}
.meal-dish-name{flex:1}
.meal-dish-cal{font-size:0.65rem;color:var(--muted)}
.meal-dish-del{background:none;border:none;color:var(--border2);font-size:0.8rem;cursor:pointer;padding:2px 5px;font-family:'Instrument Sans',sans-serif}
.meal-dish-del:active{color:var(--red)}

/* SHOPPING */
.shop-section{margin-bottom:20px}
.shop-section-title{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.shop-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:opacity 0.2s}
.shop-item.checked{opacity:0.35}
.shop-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.15s}
.shop-item.checked .shop-check{background:var(--accent2);border-color:var(--accent2)}
.shop-name{flex:1;font-size:0.88rem}
.shop-qty{font-size:0.75rem;color:var(--muted)}

/* HISTORY */
.hist-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.hist-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.hist-date{font-size:0.85rem;font-weight:600}
.hist-badges{display:flex;gap:10px;font-size:0.65rem;color:var(--muted)}
.hist-body{padding:12px 16px}
.hist-dishes{font-size:0.78rem;color:var(--muted);line-height:1.9}

/* STATS */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.kpi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.kpi-val{font-family:'Fraunces',serif;font-size:1.8rem;color:var(--accent);display:block}
.kpi-lbl{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px;display:block}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:0.78rem;width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:var(--border2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 0.5s ease}
.bar-cnt{font-size:0.7rem;color:var(--muted);width:30px;text-align:right}
.macro-avg-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.macro-avg{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;flex:1;min-width:70px}
.macro-avg-val{font-family:'Fraunces',serif;font-size:1.2rem;display:block}
.macro-avg-lbl{font-size:0.58rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-top:3px}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:20px 20px 48px;max-height:80vh;overflow-y:auto;animation:up 0.22s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.sheet-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}

.picker-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.picker-item:active{border-color:var(--accent)}
.picker-item.used{opacity:0.3;pointer-events:none}
.picker-macros{font-size:0.65rem;color:var(--muted);margin-top:2px}

/* AI CONFIRM MODAL */
.ai-confirm-box{background:var(--surface2);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-bottom:14px}
.ai-confirm-title{font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ai-confirm-name{font-size:1rem;font-weight:600;margin-bottom:6px}
.ai-confirm-macros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ai-confirm-btns{display:flex;gap:8px}
.ai-confirm-btns button{flex:1}

.empty{text-align:center;color:var(--muted);font-size:0.82rem;padding:40px 0;line-height:2.2}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<div class="sync-badge" id="sync-badge">⬤ conectando</div>

<header>
  <div class="logo">Menú <span>planificador compartido</span></div>
</header>

<!-- VIEWS -->
<div class="view active" id="view-platos">
  <br>
  <div class="sec-title">Mis platos</div>
  <div class="card" id="dish-form-card">
    <div class="card-header">
      <span class="card-title" id="form-mode-label">Nuevo plato</span>
      <button class="btn btn-ghost btn-sm" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">Cancelar</button>
    </div>
    <div class="field"><label>Nombre del plato</label><input id="f-name" type="text" placeholder="Ej: Pollo al horno con verduras" maxlength="50"/></div>
    <div style="margin-bottom:10px;font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Ingredientes</div>
    <div id="ing-list"></div>
    <button class="btn btn-ghost btn-sm" onclick="addIngRow()" style="margin-bottom:14px;width:100%">+ Ingrediente</button>
    <div class="macro-preview" id="macro-preview">
      <span style="font-size:0.7rem;color:var(--muted)">Añade ingredientes → identifica con IA → macros reales</span>
    </div>
    <div class="field"><label>Preparación</label><textarea id="f-prep" placeholder="Describe cómo preparar el plato…" rows="4"></textarea></div>
    <button class="btn btn-accent" id="save-dish-btn" onclick="saveDish()">Guardar plato</button>
  </div>
  <div id="dish-list"></div>
</div>

<div class="view" id="view-semana">
  <br>
  <div class="week-bar" id="week-bar"></div>
  <div class="day-scroll" id="day-scroll"></div>
  <div id="meals-container"></div>
  <button class="btn btn-green" style="margin-top:14px" onclick="saveWeek()">💾 Guardar semana en historial</button>
</div>

<div class="view" id="view-compra">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div class="sec-title" style="margin-bottom:0;flex:1">Lista de la compra</div>
    <button class="btn btn-ghost btn-sm" onclick="resetChecked()">Desmarcar</button>
  </div>
  <div id="shop-content"></div>
</div>

<div class="view" id="view-historial">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div class="sec-title" style="margin-bottom:0;flex:1">Historial</div>
    <button class="btn btn-danger btn-sm" onclick="clearHistory()">Borrar todo</button>
  </div>
  <div id="hist-list"></div>
</div>

<div class="view" id="view-stats">
  <br>
  <div id="stats-content"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('platos')" id="nav-platos"><span class="icon">🍽</span>Platos</button>
  <button class="nav-btn" onclick="switchView('semana')" id="nav-semana"><span class="icon">📅</span>Semana</button>
  <button class="nav-btn" onclick="switchView('compra')" id="nav-compra"><span class="icon">🛒</span>Compra</button>
  <button class="nav-btn" onclick="switchView('historial')" id="nav-historial"><span class="icon">📚</span>Historial</button>
  <button class="nav-btn" onclick="switchView('stats')" id="nav-stats"><span class="icon">📊</span>Stats</button>
</nav>

<!-- PICKER MODAL -->
<div class="overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="picker-title">Elige un plato</span>
      <button class="sheet-close" onclick="closePicker()">✕</button>
    </div>
    <div id="picker-list"></div>
  </div>
</div>

<!-- AI CONFIRM MODAL -->
<div class="overlay" id="ai-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title"><span>Confirmar ingrediente</span><button class="sheet-close" onclick="closeAI()">✕</button></div>
    <div id="ai-confirm-content"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCGyMVJEDwZ2G0vR96AGHQ4bmJZuU8TS1A",
  authDomain: "menus-20420.firebaseapp.com",
  projectId: "menus-20420",
  storageBucket: "menus-20420.firebasestorage.app",
  messagingSenderId: "512915922007",
  appId: "1:512915922007:web:e65e81d194644122445712"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const SHARED_ID = 'familia'; // shared doc ID — both users access same doc

let dishes  = [];
let week    = {};
let history = [];
let checked = JSON.parse(localStorage.getItem('ms-checked') || '[]');
let _saving = false;

const badge = document.getElementById('sync-badge');
function setSyncState(s) {
  badge.className = 'sync-badge ' + s;
  badge.textContent = s === 'synced' ? '⬤ sincronizado' : s === 'syncing' ? '⬤ guardando…' : s === 'error' ? '⬤ sin conexión' : '⬤ conectando';
}

// ── FIRESTORE SYNC ──
const docRef = doc(db, 'menus', SHARED_ID);

async function pushToFirestore() {
  if (_saving) return;
  _saving = true;
  setSyncState('syncing');
  try {
    await setDoc(docRef, { dishes, week, history }, { merge: false });
    setSyncState('synced');
  } catch(e) {
    setSyncState('error');
    console.error(e);
  }
  _saving = false;
}

// Real-time listener — updates UI instantly when other user changes data
onSnapshot(docRef, (snap) => {
  if (!snap.exists()) { setSyncState('synced'); return; }
  const data = snap.data();
  dishes  = data.dishes  || [];
  week    = data.week    || {};
  history = data.history || [];
  setSyncState('synced');
  renderDishList();
  if (activeView === 'semana')    renderSemana();
  if (activeView === 'compra')    renderCompra();
  if (activeView === 'historial') renderHistorial();
  if (activeView === 'stats')     renderStats();
}, (err) => { setSyncState('error'); console.error(err); });

function save() {
  pushToFirestore();
  localStorage.setItem('ms-checked', JSON.stringify(checked));
}

// ── CONSTANTS ──
const UNIT_OPTS = ['g','ml','unidad','taza','cdta','cda'];
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

function calcMacros(ingredients) {
  let p=0,c=0,f=0,k=0;
  (ingredients||[]).forEach(ing => {
    const m = ing.macros100; if (!m) return;
    const qty = parseFloat(ing.qty)||0;
    let g = qty;
    if (ing.unit==='unidad') g=qty*100;
    else if (ing.unit==='taza') g=qty*240;
    else if (ing.unit==='cdta') g=qty*5;
    else if (ing.unit==='cda')  g=qty*15;
    const f2=g/100;
    p+=(m.p||0)*f2; c+=(m.c||0)*f2; f+=(m.f||0)*f2; k+=(m.k||0)*f2;
  });
  return {p:Math.round(p),c:Math.round(c),f:Math.round(f),k:Math.round(k)};
}

const sk = (d,m) => `${d}-${m}`;
const gd = id => dishes.find(d => d.id === id);

// ── VIEWS ──
let activeView = 'platos';
window.switchView = function(v) {
  activeView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${v}`).classList.add('active');
  if (v==='semana')    renderSemana();
  if (v==='compra')    renderCompra();
  if (v==='historial') renderHistorial();
  if (v==='stats')     renderStats();
};

// ── INGREDIENT ROWS ──
let ingRows = [];
let aiTarget = null;

window.addIngRow = function(val) {
  const id = (Date.now()+Math.random()).toString();
  ingRows.push({id, name:val?.name||'', qty:val?.qty||'', unit:val?.unit||'g', macros100:val?.macros100||null, status:val?.macros100?'found':null});
  renderIngRows();
};

function renderIngRows() {
  const el = document.getElementById('ing-list');
  el.innerHTML = ingRows.map((r,i) => {
    let resultHtml = '';
    if (r.status==='found' && r.macros100) {
      const m=r.macros100;
      resultHtml=`<div class="ing-result found">✓ ${m.k?'🔥'+m.k+'kcal':''} · P:${m.p}g · C:${m.c}g · G:${m.f}g <span style="opacity:.6">por 100g</span></div>`;
    } else if (r.status==='notfound') {
      resultHtml=`<div class="ing-result notfound">IA no reconoció este ingrediente — macros no calculadas</div>`;
    } else if (r.status==='error') {
      resultHtml=`<div class="ing-result error">Error al consultar IA — inténtalo de nuevo</div>`;
    }
    return `
    <div class="ing-block" id="ing-block-${r.id}">
      <div class="ing-top">
        <div class="field">${i===0?'<label>Ingrediente</label>':''}
          <input type="text" value="${r.name}" placeholder="Pollo, pasta, leche…"
            oninput="window._updateIngName('${r.id}',this.value)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();window._identifyIng('${r.id}')}" />
        </div>
        <button class="ing-ai-btn" id="ai-btn-${r.id}"
          onclick="window._identifyIng('${r.id}')"
          ${!r.name.trim()?'disabled':''}>🤖 IA</button>
      </div>
      <div class="ing-bottom">
        <div class="field">${i===0?'<label>Cantidad</label>':''}
          <input type="number" value="${r.qty}" placeholder="200" min="0"
            oninput="window._updateIng('${r.id}','qty',this.value)" />
        </div>
        <div class="field">${i===0?'<label>Unidad</label>':''}
          <select onchange="window._updateIng('${r.id}','unit',this.value)">
            ${UNIT_OPTS.map(u=>`<option value="${u}" ${u===r.unit?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <button class="ing-del" onclick="window._delIng('${r.id}')">✕</button>
      </div>
      ${resultHtml}
    </div>`;
  }).join('');
  updateMacroPreview();
}

window._updateIngName = function(id, val) {
  const r = ingRows.find(r=>r.id==id);
  if (!r) return;
  r.name = val; r.macros100 = null; r.status = null;
  const btn = document.getElementById(`ai-btn-${id}`);
  if (btn) btn.disabled = !val.trim();
  updateMacroPreview();
};
window._updateIng = function(id, field, val) {
  const r = ingRows.find(r=>r.id==id);
  if (r) { r[field]=val; updateMacroPreview(); }
};
window._delIng = function(id) {
  ingRows = ingRows.filter(r=>r.id!=id);
  renderIngRows();
};

// ── AI INGREDIENT IDENTIFICATION ──
window._identifyIng = async function(id) {
  const r = ingRows.find(r=>r.id==id);
  if (!r || !r.name.trim()) return;

  const btn = document.getElementById(`ai-btn-${id}`);
  if (btn) { btn.classList.add('loading'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true; }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: `Identifica este ingrediente de cocina y da sus macronutrientes por 100g.
Ingrediente: "${r.name}"

Responde SOLO con JSON válido, sin texto extra:
{"identified": true, "canonical_name": "Nombre común", "kcal": 0, "protein_g": 0, "carbs_g": 0, "fat_g": 0}

Si no puedes identificarlo: {"identified": false}

Usa valores estándar de tablas nutricionales. Sé preciso.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if (btn) { btn.classList.remove('loading'); btn.innerHTML='🤖 IA'; btn.disabled=false; }

    if (parsed.identified && parsed.kcal !== undefined) {
      // Show confirmation modal
      aiTarget = id;
      showAIConfirm(r.name, parsed);
    } else {
      r.status = 'notfound';
      renderIngRows();
    }
  } catch(e) {
    if (btn) { btn.classList.remove('loading'); btn.innerHTML='🤖 IA'; btn.disabled=false; }
    const r2 = ingRows.find(r=>r.id==id);
    if (r2) { r2.status='error'; renderIngRows(); }
  }
};

function showAIConfirm(original, parsed) {
  document.getElementById('ai-confirm-content').innerHTML = `
    <p style="font-size:0.75rem;color:var(--muted);margin-bottom:12px">Buscaste: <em>${original}</em></p>
    <div class="ai-confirm-box">
      <div class="ai-confirm-title">La IA identificó esto</div>
      <div class="ai-confirm-name">${parsed.canonical_name}</div>
      <div class="ai-confirm-macros">
        <span class="macro-tag kcal">🔥 ${parsed.kcal} kcal</span>
        <span class="macro-tag prot">P: ${parsed.protein_g}g</span>
        <span class="macro-tag carb">C: ${parsed.carbs_g}g</span>
        <span class="macro-tag fat">G: ${parsed.fat_g}g</span>
        <span style="font-size:0.62rem;color:var(--muted)">por 100g</span>
      </div>
      <div class="ai-confirm-btns">
        <button class="btn btn-accent btn-sm" onclick="window._confirmAI(${JSON.stringify(parsed).replace(/"/g,'&quot;')})">✓ Confirmar</button>
        <button class="btn btn-ghost btn-sm" onclick="closeAI()">✕ Cancelar</button>
      </div>
    </div>
    <p style="font-size:0.7rem;color:var(--muted);text-align:center">Si los valores no son correctos, cancela y edita manualmente</p>`;
  document.getElementById('ai-overlay').classList.add('open');
}

window._confirmAI = function(parsed) {
  const r = ingRows.find(r=>r.id==aiTarget);
  if (r) {
    r.macros100 = { k: parsed.kcal, p: parsed.protein_g, c: parsed.carbs_g, f: parsed.fat_g };
    r.status = 'found';
  }
  closeAI();
  renderIngRows();
};
window.closeAI = function() {
  document.getElementById('ai-overlay').classList.remove('open');
  aiTarget = null;
};

function updateMacroPreview() {
  const m = calcMacros(ingRows);
  const el = document.getElementById('macro-preview');
  const has = ingRows.some(r=>r.macros100);
  el.innerHTML = has
    ? `<span class="macro-tag prot">P: ${m.p}g</span>
       <span class="macro-tag carb">C: ${m.c}g</span>
       <span class="macro-tag fat">G: ${m.f}g</span>
       <span class="macro-tag kcal">🔥 ${m.k} kcal</span>
       <span style="font-size:0.62rem;color:var(--muted)">total del plato</span>`
    : `<span style="font-size:0.7rem;color:var(--muted)">Añade ingredientes e identifícalos con 🤖 IA</span>`;
}

// ── PLATOS ──
let editId = null;

window.saveDish = function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const prep = document.getElementById('f-prep').value.trim();
  const ings = ingRows.filter(r=>r.name.trim());
  const macros = calcMacros(ings);

  const dishData = { name, prep, ingredients: ings, macros };

  if (editId) {
    const idx = dishes.findIndex(d=>d.id===editId);
    if (idx>-1) dishes[idx] = {...dishes[idx], ...dishData};
    cancelEdit();
  } else {
    dishes.push({id: Date.now().toString(), emoji:'🍽', ...dishData});
    document.getElementById('f-name').value='';
    document.getElementById('f-prep').value='';
    ingRows=[];
    renderIngRows();
    document.getElementById('f-name').focus();
  }
  save();
  renderDishList();
};

window.editDish = function(id) {
  const d = gd(id); if (!d) return;
  editId = id;
  document.getElementById('f-name').value = d.name;
  document.getElementById('f-prep').value = d.prep||'';
  ingRows = (d.ingredients||[]).map(i=>({...i, id:(Date.now()+Math.random()).toString()}));
  renderIngRows();
  document.getElementById('form-mode-label').textContent='Editar plato';
  document.getElementById('cancel-edit-btn').style.display='inline-flex';
  document.getElementById('save-dish-btn').textContent='Actualizar plato';
  document.getElementById('dish-form-card').scrollIntoView({behavior:'smooth'});
};

window.cancelEdit = function() {
  editId=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-prep').value='';
  ingRows=[];
  renderIngRows();
  document.getElementById('form-mode-label').textContent='Nuevo plato';
  document.getElementById('cancel-edit-btn').style.display='none';
  document.getElementById('save-dish-btn').textContent='Guardar plato';
};

window.deleteDish = function(id) {
  if (!confirm('¿Eliminar este plato?')) return;
  dishes = dishes.filter(d=>d.id!==id);
  Object.keys(week).forEach(k=>{week[k]=week[k].filter(x=>x!==id)});
  save(); renderDishList();
  if (activeView==='semana') renderMeals();
};

function renderDishList() {
  const el = document.getElementById('dish-list');
  if (!dishes.length) {
    el.innerHTML='<div class="empty">Crea tu primer plato arriba ↑<br>Identifica ingredientes con IA para calcular macros</div>';
    return;
  }
  el.innerHTML = dishes.map(d=>{
    const m=d.macros||{};
    return `<div class="dish-item" onclick="window.editDish('${d.id}')">
      <span class="dish-emoji">${d.emoji}</span>
      <div class="dish-info">
        <div class="dish-name">${d.name}</div>
        <div class="dish-macros">
          ${m.k?`<span class="macro-tag kcal">🔥${m.k}kcal</span>`:''}
          ${m.p?`<span class="macro-tag prot">P:${m.p}g</span>`:''}
          ${m.c?`<span class="macro-tag carb">C:${m.c}g</span>`:''}
          ${m.f?`<span class="macro-tag fat">G:${m.f}g</span>`:''}
          ${!m.k?'<span style="font-size:0.68rem;color:var(--muted)">Sin macros</span>':''}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();window.deleteDish('${d.id}')">✕</button>
    </div>`;
  }).join('');
}

// ── SEMANA ──
let selDay = 0;

function calcWeekTotals() {
  let k=0,pr=0,unique=new Set();
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    (week[sk(d,m)]||[]).forEach(id=>{
      const dish=gd(id); if(!dish) return;
      unique.add(id); k+=dish.macros?.k||0; pr+=dish.macros?.p||0;
    });
  });
  return {k,pr,unique:unique.size};
}

function renderSemana() { renderDayScroll(); renderMeals(); renderWeekBar(); }

function renderWeekBar() {
  const {k,pr,unique}=calcWeekTotals();
  document.getElementById('week-bar').innerHTML=`
    <div><span class="wbar-val">${unique}</span><span class="wbar-lbl">únicos</span></div>
    <div><span class="wbar-val">${k?Math.round(k/7):'—'}</span><span class="wbar-lbl">kcal/día</span></div>
    <div><span class="wbar-val">${pr?Math.round(pr/7)+'g':'—'}</span><span class="wbar-lbl">prot/día</span></div>
    <div><span class="wbar-val">${dishes.length}</span><span class="wbar-lbl">platos</span></div>`;
}

function renderDayScroll() {
  document.getElementById('day-scroll').innerHTML=DAYS.map((day,i)=>{
    const has=['lunch','dinner'].some(m=>(week[sk(i,m)]||[]).length>0);
    return `<div class="day-chip ${i===selDay?'active':''}" onclick="window._selDay(${i})">${day}${has?'<span class="dot"></span>':''}</div>`;
  }).join('');
}
window._selDay = function(i) { selDay=i; renderDayScroll(); renderMeals(); };

function renderMeals() {
  document.getElementById('meals-container').innerHTML=['lunch','dinner'].map(meal=>{
    const key=sk(selDay,meal);
    const sd=(week[key]||[]).map(gd).filter(Boolean);
    const icon=meal==='lunch'?'☀️':'🌙';
    const label=meal==='lunch'?'Comida':'Cena';
    const dhtml=sd.length
      ? sd.map(d=>`<div class="meal-dish">
          <span>${d.emoji}</span>
          <span class="meal-dish-name">${d.name}</span>
          <span class="meal-dish-cal">${d.macros?.k?d.macros.k+'k':''}</span>
          <button class="meal-dish-del" onclick="window._removeSlot(${selDay},'${meal}','${d.id}')">✕</button>
        </div>`).join('')
      : '<div class="meal-empty">Sin plato asignado</div>';
    return `<div class="meal-card ${meal}">
      <div class="meal-card-head">
        <span class="meal-label">${icon} ${label}</span>
        <button class="meal-add-btn" onclick="window.openPicker(${selDay},'${meal}')">+ Añadir</button>
      </div>
      <div class="meal-dishes">${dhtml}</div>
    </div>`;
  }).join('');
  renderWeekBar();
}

window._removeSlot = function(d,m,id) {
  const key=sk(d,m);
  if(week[key]) week[key]=week[key].filter(x=>x!==id);
  save(); renderMeals(); renderDayScroll();
};

window.saveWeek = function() {
  const {k,pr,unique}=calcWeekTotals();
  const now=new Date();
  const mon=new Date(now); mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const label=`${fmt(mon)} – ${fmt(sun)}`;
  const snap={label,date:Date.now(),k,pr,unique,slots:{}};
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    snap.slots[sk(d,m)]=(week[sk(d,m)]||[]).map(id=>{
      const dish=gd(id);
      return dish?{name:dish.name,emoji:dish.emoji,macros:dish.macros,ingredients:dish.ingredients}:null;
    }).filter(Boolean);
  });
  history.unshift(snap);
  save();
  alert('✅ Semana guardada');
};

// ── COMPRA ──
function buildShoppingList() {
  const totals={};
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    (week[sk(d,m)]||[]).forEach(id=>{
      const dish=gd(id); if(!dish) return;
      (dish.ingredients||[]).forEach(ing=>{
        if(!ing.name.trim()) return;
        const key=ing.name.toLowerCase().trim()+'_'+ing.unit;
        if(!totals[key]) totals[key]={name:ing.name,unit:ing.unit,qty:0};
        totals[key].qty+=parseFloat(ing.qty)||0;
      });
    });
  });
  return Object.values(totals);
}

function renderCompra() {
  const el=document.getElementById('shop-content');
  const list=buildShoppingList();
  if(!list.length){el.innerHTML='<div class="empty">Planifica tu semana primero.<br>Los ingredientes aparecerán aquí.</div>';return;}
  el.innerHTML=`<div class="shop-section"><div class="shop-section-title">Ingredientes de la semana</div>
  ${list.map(item=>{
    const ckey=item.name.toLowerCase()+'_'+item.unit;
    const isChecked=checked.includes(ckey);
    return `<div class="shop-item ${isChecked?'checked':''}" onclick="window._toggleCheck('${ckey}')">
      <div class="shop-check">${isChecked?'✓':''}</div>
      <span class="shop-name">${item.name}</span>
      <span class="shop-qty">${item.qty>0?item.qty+' '+item.unit:item.unit}</span>
    </div>`;
  }).join('')}</div>`;
}

window._toggleCheck = function(key) {
  const idx=checked.indexOf(key);
  if(idx>-1) checked.splice(idx,1); else checked.push(key);
  localStorage.setItem('ms-checked',JSON.stringify(checked));
  renderCompra();
};
window.resetChecked = function() { checked=[]; localStorage.setItem('ms-checked',JSON.stringify(checked)); renderCompra(); };

// ── HISTORIAL ──
function renderHistorial() {
  const el=document.getElementById('hist-list');
  if(!history.length){el.innerHTML='<div class="empty">Aún no hay semanas guardadas.<br>Ve a "Semana" y pulsa guardar.</div>';return;}
  el.innerHTML=history.map(h=>{
    let names=[];
    for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
      (h.slots[sk(d,m)]||[]).forEach(dish=>names.push(dish.emoji+' '+dish.name));
    });
    const uniq=[...new Set(names)];
    return `<div class="hist-card">
      <div class="hist-head">
        <span class="hist-date">${h.label}</span>
        <div class="hist-badges">
          <span>${h.unique} platos</span>
          ${h.k?'<span>'+Math.round(h.k/7)+'kcal/d</span>':''}
        </div>
      </div>
      <div class="hist-body"><div class="hist-dishes">${uniq.slice(0,8).join('  ·  ')}${uniq.length>8?' +'+(uniq.length-8)+' más':''}</div></div>
    </div>`;
  }).join('');
}
window.clearHistory = function() {
  if(!confirm('¿Borrar todo el historial?')) return;
  history=[]; save(); renderHistorial();
};

// ── STATS ──
function renderStats() {
  const el=document.getElementById('stats-content');
  if(!history.length){el.innerHTML='<div class="empty">Guarda al menos una semana<br>para ver estadísticas.</div>';return;}
  const counts={},kcals=[],prots=[];
  history.forEach(h=>{
    kcals.push(h.k||0); prots.push(h.pr||0);
    for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
      (h.slots[sk(d,m)]||[]).forEach(dish=>{
        const key=dish.emoji+' '+dish.name;
        counts[key]=(counts[key]||0)+1;
      });
    });
  });
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxC=sorted[0]?.[1]||1;
  const avgK=kcals.reduce((a,b)=>a+b,0)/history.length;
  const avgP=prots.reduce((a,b)=>a+b,0)/history.length;
  const avgU=history.reduce((a,h)=>a+h.unique,0)/history.length;
  el.innerHTML=`
    <div class="sec-title">Resumen</div>
    <div class="kpi-row">
      <div class="kpi"><span class="kpi-val">${history.length}</span><span class="kpi-lbl">semanas</span></div>
      <div class="kpi"><span class="kpi-val">${Math.round(avgU)}</span><span class="kpi-lbl">platos únicos/sem</span></div>
      <div class="kpi"><span class="kpi-val">${avgK?Math.round(avgK/7):'—'}</span><span class="kpi-lbl">kcal/día prom</span></div>
      <div class="kpi"><span class="kpi-val">${avgP?Math.round(avgP/7)+'g':'—'}</span><span class="kpi-lbl">prot/día prom</span></div>
    </div>
    <div class="sec-title">Más repetidos</div>
    ${sorted.map(([name,count])=>`
      <div class="bar-row">
        <span class="bar-lbl">${name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxC*100)}%"></div></div>
        <span class="bar-cnt">${count}x</span>
      </div>`).join('')}`;
}

// ── PICKER ──
let pickerTarget=null;
window.openPicker = function(dayIdx, meal) {
  pickerTarget={dayIdx,meal};
  const key=sk(dayIdx,meal);
  const assigned=week[key]||[];
  document.getElementById('picker-title').textContent=`${DAYS[dayIdx]} — ${meal==='lunch'?'Comida':'Cena'}`;
  const list=document.getElementById('picker-list');
  list.innerHTML=!dishes.length
    ? '<div class="empty">Crea platos primero en "Platos"</div>'
    : dishes.map(d=>{
        const used=assigned.includes(d.id);
        const m=d.macros||{};
        return `<div class="picker-item ${used?'used':''}" onclick="window._pickDish('${d.id}')">
          <span style="font-size:1.4rem">${d.emoji}</span>
          <div style="flex:1">
            <div style="font-size:0.9rem;font-weight:500">${d.name}</div>
            <div class="picker-macros">${m.k?'🔥'+m.k+'kcal':''} ${m.p?'· P:'+m.p+'g':''}</div>
          </div>
          ${used?'<span style="color:var(--accent2);font-size:0.8rem">✓</span>':''}
        </div>`;
      }).join('');
  document.getElementById('picker-overlay').classList.add('open');
};
window._pickDish = function(id) {
  if(!pickerTarget) return;
  const key=sk(pickerTarget.dayIdx,pickerTarget.meal);
  if(!week[key]) week[key]=[];
  if(!week[key].includes(id)) week[key].push(id);
  save(); closePicker(); renderMeals(); renderDayScroll();
};
window.closePicker = function(e) {
  if(e && e.target!==document.getElementById('picker-overlay')) return;
  document.getElementById('picker-overlay').classList.remove('open');
  pickerTarget=null;
};

// ── INIT ──
renderDishList();
renderIngRows();
</script>
