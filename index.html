<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c; --surface: #1a1815; --surface2: #242220;
  --ink: #f0ece4; --muted: #6b6560; --accent: #e8a327;
  --accent2: #4a9e6b; --red: #d44f3a; --border: #2e2b27; --border2: #3a3630;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 72px; }

/* SYNC INDICATOR */
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; transition: background 0.3s; }
.sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.ok { background: var(--accent2); }
.sync-dot.err { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

header {
  padding: 16px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
.logo span { font-style: italic; font-weight: 300; color: var(--muted); font-size: 0.75rem; display: block; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; font-size: 0.65rem; color: var(--muted); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border2);
  display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 8px; font-size: 0.52rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  border: none; background: none; font-family: 'Instrument Sans', sans-serif; gap: 3px;
}
.nav-btn .icon { font-size: 1.1rem; }
.nav-btn.active { color: var(--accent); }

.view { display: none; padding: 16px; }
.view.active { display: block; }

.sec-title {
  font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border2); }

/* CARDS & FORMS */
.card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.field input, .field select, .field textarea {
  width: 100%; font-family: 'Instrument Sans', sans-serif; font-size: 0.9rem;
  padding: 10px 13px; border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--ink); border-radius: 8px; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s;
}
.field textarea { resize: vertical; line-height: 1.6; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: var(--muted); }

.btn { font-family: 'Instrument Sans', sans-serif; font-size: 0.78rem; font-weight: 600; padding: 11px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #000; width: 100%; }
.btn-accent:active { background: #c98e1e; }
.btn-ghost { background: none; color: var(--muted); border: 1.5px solid var(--border2); }
.btn-ghost:active { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: none; color: var(--red); border: 1.5px solid var(--red); }
.btn-sm { font-size: 0.7rem; padding: 7px 11px; }
.btn-green { background: var(--accent2); color: #fff; width: 100%; }

/* DISH LIST */
.dish-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.dish-item:active { border-color: var(--accent); }
.dish-info { flex: 1; min-width: 0; }
.dish-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
.dish-macros { font-size: 0.66rem; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
.macro-tag { padding: 2px 5px; border-radius: 4px; background: var(--surface); }
.macro-tag.prot { color: #6db4e8; } .macro-tag.carb { color: var(--accent); }
.macro-tag.fat { color: #e87b6d; } .macro-tag.kcal { color: var(--muted); }

/* INGREDIENT BLOCK */
.ing-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.ing-top { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
.ing-top .field { flex: 1; margin-bottom: 0; }
.ing-cat-btn {
  font-size: 0.7rem; font-weight: 600; padding: 10px 11px;
  background: var(--surface); color: var(--accent); border: 1.5px solid var(--accent); border-radius: 8px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: 'Instrument Sans', sans-serif;
}
.ing-cat-btn.confirmed { background: rgba(74,158,107,0.15); color: var(--accent2); border-color: var(--accent2); }
.ing-bottom { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
.ing-bottom .field { margin-bottom: 0; }
.ing-del { background: none; border: 1.5px solid var(--border); color: var(--muted); font-size: 0.78rem; cursor: pointer; padding: 9px 10px; border-radius: 8px; }
.ing-del:active { color: var(--red); border-color: var(--red); }
.ing-result { font-size: 0.68rem; margin-top: 6px; padding: 7px 9px; border-radius: 6px; }
.ing-result.found { color: var(--accent2); background: rgba(74,158,107,0.1); }
.ing-result.notfound { color: var(--muted); background: var(--surface); }

/* MACRO PREVIEW */
.macro-preview { background: var(--surface2); border-radius: 8px; padding: 11px 13px; margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

/* WEEK VIEW */
.week-bar { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 13px 16px; margin-bottom: 12px; display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; text-align: center; }
.wbar-val { font-family: 'Fraunces', serif; font-size: 1.15rem; color: var(--accent); display: block; }
.wbar-lbl { font-size: 0.54rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 1px; }

.day-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.day-scroll::-webkit-scrollbar { display: none; }
.day-chip { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 0.68rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); transition: all 0.15s; }
.day-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.day-chip .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); margin-left: 4px; vertical-align: middle; }

.meal-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.meal-card.lunch { background: #1a1710; } .meal-card.dinner { background: #101a13; }
.meal-card-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; border-bottom: 1px solid var(--border); }
.meal-label { font-size: 0.66rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
.meal-card.lunch .meal-label { color: var(--accent); } .meal-card.dinner .meal-label { color: var(--accent2); }
.meal-add-btn { font-size: 0.66rem; padding: 5px 11px; border: 1px solid var(--border2); background: none; border-radius: 6px; cursor: pointer; font-family: 'Instrument Sans', sans-serif; color: var(--muted); }
.meal-add-btn:active { border-color: var(--accent); color: var(--accent); }
.meal-dishes { padding: 9px 15px; min-height: 52px; display: flex; flex-direction: column; gap: 5px; }
.meal-empty { font-size: 0.72rem; color: var(--border2); padding: 5px 0; }
.meal-dish { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px; font-size: 0.83rem; }
.meal-card.lunch .meal-dish { background: rgba(232,163,39,0.07); } .meal-card.dinner .meal-dish { background: rgba(74,158,107,0.07); }
.meal-dish-name { flex: 1; } .meal-dish-cal { font-size: 0.63rem; color: var(--muted); }
.meal-dish-del { background: none; border: none; color: var(--border2); font-size: 0.78rem; cursor: pointer; padding: 2px 5px; font-family: 'Instrument Sans', sans-serif; }

/* SHOPPING */
.shop-section { margin-bottom: 18px; }
.shop-section-title { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 7px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.shop-item { display: flex; align-items: center; gap: 11px; padding: 11px 13px; background: var(--surface2); border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: opacity 0.2s; }
.shop-item.checked { opacity: 0.32; }
.shop-check { width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; transition: all 0.15s; }
.shop-item.checked .shop-check { background: var(--accent2); border-color: var(--accent2); }
.shop-name { flex: 1; font-size: 0.86rem; } .shop-qty { font-size: 0.72rem; color: var(--muted); }

/* HISTORY */
.hist-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 9px; overflow: hidden; }
.hist-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; background: var(--surface); border-bottom: 1px solid var(--border); }
.hist-date { font-size: 0.83rem; font-weight: 600; }
.hist-badges { display: flex; gap: 9px; font-size: 0.63rem; color: var(--muted); }
.hist-body { padding: 11px 15px; }
.hist-dishes { font-size: 0.76rem; color: var(--muted); line-height: 1.9; }

/* STATS */
.kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
.kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.kpi-val { font-family: 'Fraunces', serif; font-size: 1.7rem; color: var(--accent); display: block; }
.kpi-lbl { font-size: 0.56rem; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin-top: 3px; display: block; }
.bar-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.bar-lbl { font-size: 0.76rem; width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s ease; }
.bar-cnt { font-size: 0.68rem; color: var(--muted); width: 28px; text-align: right; }

/* MODALS */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--surface); width: 100%; border-radius: 18px 18px 0 0; padding: 18px 18px 46px; max-height: 80vh; overflow-y: auto; animation: up 0.22s ease; }
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 34px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-family: 'Fraunces', serif; font-size: 1.05rem; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.sheet-close { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }

.picker-item { display: flex; align-items: center; gap: 11px; padding: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 7px; cursor: pointer; }
.picker-item:active { border-color: var(--accent); }
.picker-item.used { opacity: 0.3; pointer-events: none; }
.picker-macros { font-size: 0.63rem; color: var(--muted); margin-top: 2px; }

/* CATEGORY PICKER */
.cat-group { margin-bottom: 14px; }
.cat-group-title { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cat-item { padding: 11px 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color 0.15s; }
.cat-item:active { border-color: var(--accent2); }
.cat-item-saved { background: rgba(74,158,107,0.08); border-color: rgba(74,158,107,0.3); position: relative; }
.cat-item-saved .cat-item-name::before { content: '★ '; color: var(--accent2); font-size: 0.75rem; }
.cat-item-del { position: absolute; top: 6px; right: 6px; background: none; border: none; color: var(--muted); font-size: 0.7rem; cursor: pointer; padding: 2px 5px; font-family: 'Instrument Sans', sans-serif; }
.cat-item-del:active { color: var(--red); }
.save-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-top: 10px; cursor: pointer; font-size: 0.82rem; }
.save-toggle input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent2); flex-shrink: 0; }

.empty { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 36px 0; line-height: 2.2; }

/* LOADING SPINNER */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
.toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border2); color: var(--ink); padding: 10px 18px; border-radius: 20px; font-size: 0.8rem; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">Menú <span>planificador semanal</span></div>
  <div class="header-right">
    <span id="sync-label">—</span>
    <span class="sync-dot" id="sync-dot"></span>
  </div>
</header>

<!-- VIEWS -->
<div class="view active" id="view-platos">
  <br>
  <div class="sec-title">Mis platos</div>
  <div class="card" id="dish-form-card">
    <div class="card-header">
      <span class="card-title" id="form-mode-label">Nuevo plato</span>
      <button class="btn btn-ghost btn-sm" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">Cancelar</button>
    </div>
    <div class="field"><label>Nombre del plato</label><input id="f-name" type="text" placeholder="Ej: Pollo al horno con verduras" maxlength="50"/></div>
    <div style="margin-bottom:8px; font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);">Ingredientes</div>
    <div id="ing-list"></div>
    <button class="btn btn-ghost btn-sm" onclick="addIngRow()" style="margin-bottom:12px;width:100%">+ Ingrediente</button>
    <div class="macro-preview" id="macro-preview">
      <span style="font-size:0.7rem;color:var(--muted)">Identifica ingredientes con IA para calcular macros</span>
    </div>
    <div class="field"><label>Preparación</label><textarea id="f-prep" placeholder="Describe cómo preparar el plato…" rows="4"></textarea></div>
    <button class="btn btn-accent" id="save-dish-btn" onclick="saveDish()">Guardar plato</button>
  </div>
  <div id="dish-list"></div>
</div>

<div class="view" id="view-semana">
  <br>
  <div class="week-bar" id="week-bar"></div>
  <div class="day-scroll" id="day-scroll"></div>
  <div id="meals-container"></div>
  <button class="btn btn-green" style="margin-top:14px" onclick="saveWeek()">💾 Guardar semana en historial</button>
</div>

<div class="view" id="view-compra">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div class="sec-title" style="margin-bottom:0;flex:1">Lista de la compra</div>
    <button class="btn btn-ghost btn-sm" onclick="resetChecked()">Desmarcar</button>
  </div>
  <div id="shop-content"></div>
</div>

<div class="view" id="view-historial">
  <br>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div class="sec-title" style="margin-bottom:0;flex:1">Historial</div>
    <button class="btn btn-danger btn-sm" onclick="clearHistory()">Borrar</button>
  </div>
  <div id="hist-list"></div>
</div>

<div class="view" id="view-stats">
  <br>
  <div id="stats-content"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('platos')" id="nav-platos"><span class="icon">🍽</span>Platos</button>
  <button class="nav-btn" onclick="switchView('semana')" id="nav-semana"><span class="icon">📅</span>Semana</button>
  <button class="nav-btn" onclick="switchView('compra')" id="nav-compra"><span class="icon">🛒</span>Compra</button>
  <button class="nav-btn" onclick="switchView('historial')" id="nav-historial"><span class="icon">📚</span>Historial</button>
  <button class="nav-btn" onclick="switchView('stats')" id="nav-stats"><span class="icon">📊</span>Stats</button>
</nav>

<!-- CATEGORY PICKER MODAL -->
<div class="overlay" id="cat-overlay" onclick="closeCat(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="cat-title">¿Qué tipo de alimento es?</span>
      <button class="sheet-close" onclick="closeCat()">✕</button>
    </div>
    <div id="cat-body"></div>
  </div>
</div>

<!-- PICKER MODAL -->
<div class="overlay" id="picker-overlay" onclick="closePicker(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="picker-title">Elige un plato</span>
      <button class="sheet-close" onclick="closePicker()">✕</button>
    </div>
    <div id="picker-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, setDoc, getDoc, updateDoc, deleteDoc, getDocs, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGyMVJEDwZ2G0vR96AGHQ4bmJZuU8TS1A",
  authDomain: "menus-20420.firebaseapp.com",
  projectId: "menus-20420",
  storageBucket: "menus-20420.firebasestorage.app",
  messagingSenderId: "512915922007",
  appId: "1:512915922007:web:e65e81d194644122445712"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── SYNC STATE ──
function setSyncState(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── LOCAL STATE (mirror of Firestore) ──
window._dishes  = [];
window._week    = {};
window._history = [];
window._checked = JSON.parse(localStorage.getItem('ms-checked') || '[]');

// ── REALTIME LISTENERS ──
function startListeners() {
  // Dishes
  onSnapshot(collection(db, 'dishes'), snap => {
    window._dishes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setSyncState('ok', 'sincronizado');
    if (window._activeView === 'platos') window.renderDishList();
    if (window._activeView === 'semana') window.renderSemana();
    if (window._activeView === 'stats')  window.renderStats();
  }, () => setSyncState('err', 'sin conexión'));

  // Week
  onSnapshot(doc(db, 'state', 'week'), snap => {
    window._week = snap.exists() ? snap.data() : {};
    if (window._activeView === 'semana') window.renderSemana();
    if (window._activeView === 'compra') window.renderCompra();
  });

  // History
  onSnapshot(collection(db, 'history'), snap => {
    window._history = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => b.date - a.date);
    if (window._activeView === 'historial') window.renderHistorial();
    if (window._activeView === 'stats')     window.renderStats();
  });
  // Ingredient library
  onSnapshot(collection(db, 'ingLib'), snap => {
    window._ingLib = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => a.name.localeCompare(b.name));
  });
}
window._saveDishToDb = async (dish) => {
  setSyncState('syncing', 'guardando…');
  await setDoc(doc(db, 'dishes', dish.id), dish);
};

window._deleteDishFromDb = async (id) => {
  setSyncState('syncing', 'guardando…');
  await deleteDoc(doc(db, 'dishes', id));
};

window._saveWeekToDb = async (weekData) => {
  setSyncState('syncing', 'guardando…');
  await setDoc(doc(db, 'state', 'week'), weekData);
};

window._saveHistoryEntry = async (entry) => {
  setSyncState('syncing', 'guardando…');
  await setDoc(doc(db, 'history', entry.id), entry);
};

window._clearHistoryInDb = async () => {
  setSyncState('syncing', 'borrando…');
  const snap = await getDocs(collection(db, 'history'));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
};

window._saveIngLibToDb = async (ing) => {
  setSyncState('syncing', 'guardando…');
  await setDoc(doc(db, 'ingLib', ing.id), ing);
};

window._deleteIngLibFromDb = async (id) => {
  setSyncState('syncing', 'borrando…');
  await deleteDoc(doc(db, 'ingLib', id));
};

window._ingLib = [];

setSyncState('syncing', 'conectando…');
startListeners();
</script>

function toast(msg, duration=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── MACROS ──
function calcMacros(ingredients) {
  let p=0,c=0,f=0,k=0;
  (ingredients||[]).forEach(ing => {
    const m = ing.macros100; if (!m) return;
    const qty = parseFloat(ing.qty)||0;
    let g = qty;
    if (ing.unit==='unidad') g=qty*100;
    else if (ing.unit==='taza') g=qty*240;
    else if (ing.unit==='cdta') g=qty*5;
    else if (ing.unit==='cda')  g=qty*15;
    const f2 = g/100;
    p+=(m.p||0)*f2; c+=(m.c||0)*f2; f+=(m.f||0)*f2; k+=(m.k||0)*f2;
  });
  return {p:Math.round(p),c:Math.round(c),f:Math.round(f),k:Math.round(k)};
}

function macroHtml(m, price) {
  if (!m) return '<span style="font-size:0.68rem;color:var(--muted)">Sin datos</span>';
  return `${m.k?`<span class="macro-tag kcal">🔥${m.k}kcal</span>`:''}
    ${m.p?`<span class="macro-tag prot">P:${m.p}g</span>`:''}
    ${m.c?`<span class="macro-tag carb">C:${m.c}g</span>`:''}
    ${m.f?`<span class="macro-tag fat">G:${m.f}g</span>`:''}
    ${price?`<span class="macro-tag" style="color:var(--accent2)">${parseFloat(price).toFixed(2)}€</span>`:''}`;
}

  const r = ingRows.find(r=>r.id==catTarget); if (!r) return;
  r.macros100 = { p:item.p, c:item.c, f:item.f, k:item.k };
  r.confirmed = true;

  const lib = window._ingLib || [];
  const alreadySaved = lib.some(l => l.name.toLowerCase() === item.name.toLowerCase());
  closeCat();
  renderIngRows();
  if (!alreadySaved) {
    setTimeout(() => {
      if (confirm(`¿Guardar "${item.name}" en tu biblioteca para usarlo en otras recetas?`)) {
        saveToIngLib({ name: item.name, p: item.p, c: item.c, f: item.f, k: item.k });
      }
    }, 200);
  }
}

function confirmManual() {
  const k = parseFloat(document.getElementById('m-k').value) || 0;
  const p = parseFloat(document.getElementById('m-p').value) || 0;
  const c = parseFloat(document.getElementById('m-c').value) || 0;
  const f = parseFloat(document.getElementById('m-f').value) || 0;
  if (!k && !p && !c && !f) { toast('Introduce al menos un valor'); return; }
  const r = ingRows.find(r=>r.id==catTarget); if (!r) return;
  r.macros100 = { k, p, c, f };
  r.confirmed = true;
  const shouldSave = document.getElementById('m-save')?.checked;
  const ingName = r.name.trim();
  closeCat(); renderIngRows();
  if (shouldSave && ingName) {
    saveToIngLib({ name: ingName, k, p, c, f });
  }
}

async function saveDish() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const prep  = document.getElementById('f-prep').value.trim();
  const ings  = ingRows.filter(r=>r.name.trim());
  const macros = calcMacros(ings);
  const id = editId || Date.now().toString();

  const dish = { id, name, prep, ingredients: ings, macros };
  await window._saveDishToDb(dish);

  if (editId) { cancelEdit(); toast('Plato actualizado'); }
  else {
    document.getElementById('f-name').value='';
    document.getElementById('f-prep').value='';
    ingRows=[]; renderIngRows();
    document.getElementById('f-name').focus();
    toast('Plato guardado');
  }
}

  const d = gd(id); if (!d) return;
  editId = id;
  document.getElementById('f-name').value = d.name;

  ingRows = (d.ingredients||[]).map(i=>({...i,id:(Date.now()+Math.random()).toString()}));

function calcWeekTotals() {
  let k=0,pr=0,ids=new Set();
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    (window._week[sk(d,m)]||[]).forEach(id=>{
      const dish=gd(id); if(!dish) return;
      ids.add(id); k+=(dish.macros?.k||0); pr+=(dish.macros?.p||0);
    });
  });
  return {k,pr,unique:ids.size};
}

function renderSemana() { renderWeekBar(); renderDayScroll(); renderMeals(); }
window.renderSemana = renderSemana;

function renderWeekBar() {
  const {k,pr,unique} = calcWeekTotals();
  document.getElementById('week-bar').innerHTML=`
    <div><span class="wbar-val">${unique}</span><span class="wbar-lbl">únicos</span></div>
    <div><span class="wbar-val">${k?Math.round(k/7):'—'}</span><span class="wbar-lbl">kcal/día</span></div>
    <div><span class="wbar-val">${pr?Math.round(pr/7)+'g':'—'}</span><span class="wbar-lbl">prot/día</span></div>
    <div><span class="wbar-val">${(window._dishes||[]).length}</span><span class="wbar-lbl">platos</span></div>`;
}

function renderDayScroll() {
  document.getElementById('day-scroll').innerHTML = DAYS.map((day,i)=>{
    const has = ['lunch','dinner'].some(m=>(window._week[sk(i,m)]||[]).length>0);
    return `<div class="day-chip ${i===selDay?'active':''}" onclick="selDay=${i};renderSemana()">
      ${day}${has?'<span class="dot"></span>':''}
    </div>`;
  }).join('');
}

function renderMeals() {
  document.getElementById('meals-container').innerHTML=['lunch','dinner'].map(meal=>{
    const key=sk(selDay,meal);
    const slotDishes=(window._week[key]||[]).map(gd).filter(Boolean);
    const icon=meal==='lunch'?'☀️':'🌙';
    const label=meal==='lunch'?'Comida':'Cena';
    const dishesHtml=slotDishes.length
      ? slotDishes.map(d=>`
          <div class="meal-dish">
            <span class="meal-dish-name">🍽 ${d.name}</span>
            <span class="meal-dish-cal">${d.macros?.k?d.macros.k+'k':''}</span>
            <button class="meal-dish-del" onclick="removeFromSlot(${selDay},'${meal}','${d.id}')">✕</button>
          </div>`).join('')
      : '<div class="meal-empty">Sin plato asignado</div>';
    return `
      <div class="meal-card ${meal}">
        <div class="meal-card-head">
          <span class="meal-label">${icon} ${label}</span>
          <button class="meal-add-btn" onclick="openPicker(${selDay},'${meal}')">+ Añadir</button>
        </div>
        <div class="meal-dishes">${dishesHtml}</div>
      </div>`;
  }).join('');
  renderWeekBar();
}

async function removeFromSlot(dayIdx, meal, dishId) {
  const key=sk(dayIdx,meal);
  const newWeek={...window._week};
  newWeek[key]=(newWeek[key]||[]).filter(id=>id!==dishId);
  await window._saveWeekToDb(newWeek);
}
window.removeFromSlot = removeFromSlot;

async function saveWeek() {
  const {k,pr,unique} = calcWeekTotals();
  const now=new Date();
  const mon=new Date(now); mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const label=`${fmt(mon)} – ${fmt(sun)}`;
  const slots={};
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    slots[sk(d,m)]=(window._week[sk(d,m)]||[]).map(id=>{
      const dish=gd(id); return dish?{name:dish.name,macros:dish.macros,ingredients:dish.ingredients}:null;
    }).filter(Boolean);
  });
  const entry={id:Date.now().toString(),label,date:Date.now(),k,pr,unique,slots};
  await window._saveHistoryEntry(entry);
  toast('✅ Semana guardada en historial');
}
window.saveWeek = saveWeek;

// ── COMPRA ──
function buildShoppingList() {
  const totals={};
  for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
    (window._week[sk(d,m)]||[]).forEach(id=>{
      const dish=gd(id); if(!dish) return;
      (dish.ingredients||[]).forEach(ing=>{
        if(!ing.name.trim()) return;
        const key=ing.name.toLowerCase().trim()+'_'+ing.unit;
        if(!totals[key]) totals[key]={name:ing.name,unit:ing.unit,qty:0};
        totals[key].qty+=parseFloat(ing.qty)||0;
      });
    });
  });
  return Object.values(totals);
}

function renderCompra() {
  const el=document.getElementById('shop-content');
  const list=buildShoppingList();
  if(!list.length){
    el.innerHTML='<div class="empty">Planifica tu semana primero.<br>Los ingredientes aparecerán aquí.</div>';
    return;
  }
  const prot=['pollo','carne','ternera','cerdo','salmón','salmon','atun','atún','huevo','huevos','jamon','jamón','chorizo','pechuga','merluza','bacalao'];
  const veg=['tomate','cebolla','zanahoria','lechuga','espinaca','brócoli','brocoli','pimiento','pepino','calabacín','berenjena','ajo','puerro'];
  const carb=['arroz','pasta','patata','pan','lentejas','garbanzos','espagueti','macarrones','quinoa','avena'];
  const groups={'Proteínas':[],'Verduras':[],'Carbohidratos':[],'Lácteos y otros':[]};
  const lac=['leche','queso','yogur','mantequilla','nata','huevo'];

  list.forEach(item=>{
    const k=item.name.toLowerCase();
    if(prot.some(p=>k.includes(p))) groups['Proteínas'].push(item);
    else if(veg.some(p=>k.includes(p))) groups['Verduras'].push(item);
    else if(carb.some(p=>k.includes(p))) groups['Carbohidratos'].push(item);
    else groups['Lácteos y otros'].push(item);
  });

  el.innerHTML=Object.entries(groups).filter(([,items])=>items.length).map(([gname,items])=>`
    <div class="shop-section">
      <div class="shop-section-title">${gname}</div>
      ${items.map(item=>{
        const ckey=item.name.toLowerCase()+'_'+item.unit;
        const isChecked=(window._checked||[]).includes(ckey);
        return `<div class="shop-item ${isChecked?'checked':''}" onclick="toggleCheck('${ckey}')">
          <div class="shop-check">${isChecked?'✓':''}</div>
          <span class="shop-name">${item.name}</span>
          <span class="shop-qty">${item.qty>0?item.qty+' ':''} ${item.unit}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}
window.renderCompra = renderCompra;

function toggleCheck(key) {
  const idx=(window._checked||[]).indexOf(key);
  if(idx>-1) window._checked.splice(idx,1); else window._checked.push(key);
  localStorage.setItem('ms-checked',JSON.stringify(window._checked));
  renderCompra();
}
window.toggleCheck = toggleCheck;

function resetChecked() { window._checked=[]; localStorage.setItem('ms-checked','[]'); renderCompra(); }
window.resetChecked = resetChecked;

// ── HISTORIAL ──
function renderHistorial() {
  const el=document.getElementById('hist-list');
  const history=window._history||[];
  if(!history.length){
    el.innerHTML='<div class="empty">Aún no hay semanas guardadas.<br>Ve a Semana y pulsa guardar.</div>';
    return;
  }
  el.innerHTML=history.map(h=>{
    let names=[];
    for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
      (h.slots[sk(d,m)]||[]).forEach(dish=>names.push('🍽 '+dish.name));
    });
    const unique=[...new Set(names)];
    return `<div class="hist-card">
      <div class="hist-head">
        <span class="hist-date">${h.label}</span>
        <div class="hist-badges">
          <span>${h.unique} platos</span>
          ${h.k?'<span>'+Math.round(h.k/7)+'kcal/d</span>':''}
        </div>
      </div>
      <div class="hist-body">
        <div class="hist-dishes">${unique.slice(0,8).join('  ·  ')}${unique.length>8?'  +'+(unique.length-8)+' más':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.renderHistorial = renderHistorial;

async function clearHistory() {
  if(!confirm('¿Borrar todo el historial?')) return;
  await window._clearHistoryInDb();
  toast('Historial borrado');
}
window.clearHistory = clearHistory;

// ── STATS ──
function renderStats() {
  const el=document.getElementById('stats-content');
  const history=window._history||[];
  if(!history.length){
    el.innerHTML='<div class="empty">Guarda al menos una semana<br>para ver estadísticas.</div>';
    return;
  }
  const counts={};
  let kcals=[],prots=[];
  history.forEach(h=>{
    kcals.push(h.k||0); prots.push(h.pr||0);
    for(let d=0;d<7;d++) ['lunch','dinner'].forEach(m=>{
      (h.slots[sk(d,m)]||[]).forEach(dish=>{
        counts[dish.name]=(counts[dish.name]||0)+1;
      });
    });
  });
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxC=sorted[0]?.[1]||1;
  const avgK=kcals.reduce((a,b)=>a+b,0)/history.length;
  const avgP=prots.reduce((a,b)=>a+b,0)/history.length;
  const avgU=history.reduce((a,h)=>a+h.unique,0)/history.length;

  el.innerHTML=`
    <div class="sec-title">Resumen general</div>
    <div class="kpi-row">
      <div class="kpi"><span class="kpi-val">${history.length}</span><span class="kpi-lbl">semanas</span></div>
      <div class="kpi"><span class="kpi-val">${Math.round(avgU)}</span><span class="kpi-lbl">platos únicos/sem</span></div>
      <div class="kpi"><span class="kpi-val">${avgK?Math.round(avgK/7):'—'}</span><span class="kpi-lbl">kcal/día prom</span></div>
      <div class="kpi"><span class="kpi-val">${avgP?Math.round(avgP/7)+'g':'—'}</span><span class="kpi-lbl">proteína/día prom</span></div>
    </div>
    <div class="sec-title">Platos más repetidos</div>
    ${sorted.map(([name,count])=>`
      <div class="bar-row">
        <span class="bar-lbl">🍽 ${name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxC*100)}%"></div></div>
        <span class="bar-cnt">${count}x</span>
      </div>`).join('')}`;
}
window.renderStats = renderStats;

// ── PICKER ──
function openPicker(dayIdx, meal) {
  pickerTarget={dayIdx,meal};
  const key=sk(dayIdx,meal);
  const assigned=window._week[key]||[];
  document.getElementById('picker-title').textContent=`${DAYS[dayIdx]} — ${meal==='lunch'?'Comida':'Cena'}`;
  const list=document.getElementById('picker-list');
  const dishes=window._dishes||[];
  list.innerHTML=!dishes.length
    ? '<div class="empty">Crea platos primero en "Platos"</div>'
    : dishes.map(d=>{
        const used=assigned.includes(d.id);
        const m=d.macros||{};
        return `<div class="picker-item ${used?'used':''}" onclick="pickDish('${d.id}')">
          <div style="flex:1">
            <div style="font-size:0.88rem;font-weight:500">🍽 ${d.name}</div>
            <div class="picker-macros">${m.k?'🔥'+m.k+'kcal':''} ${m.p?'· P:'+m.p+'g':''}</div>
          </div>
          ${used?'<span style="color:var(--accent2)">✓</span>':'<span style="color:var(--muted)">→</span>'}
        </div>`;
      }).join('');
  document.getElementById('picker-overlay').classList.add('open');
}
window.openPicker = openPicker;

async function pickDish(dishId) {
  if(!pickerTarget) return;
  const key=sk(pickerTarget.dayIdx,pickerTarget.meal);
  const newWeek={...window._week};
  if(!newWeek[key]) newWeek[key]=[];
  if(!newWeek[key].includes(dishId)) newWeek[key].push(dishId);
  await window._saveWeekToDb(newWeek);
  closePicker();
}
window.pickDish = pickDish;

function closePicker(e) {
  if(e&&e.target!==document.getElementById('picker-overlay')) return;
  document.getElementById('picker-overlay').classList.remove('open');
  pickerTarget=null;
}
window.closePicker = closePicker;

// ── INIT ──
document.getElementById('f-name').addEventListener('keydown', e=>{ if(e.key==='Enter') saveDish(); });
renderIngRows();
</script>
